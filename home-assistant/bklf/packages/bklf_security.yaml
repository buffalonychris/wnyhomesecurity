# BKLF security helpers and template status package.
#
# Repo scaffold only. Verify all live entity IDs in Home Assistant before
# production use. Home Assistant may create different IDs during pairing.

input_boolean:
  bklf_building_armed:
    name: BKLF Building Armed
    icon: mdi:shield-home
  bklf_maintenance_mode:
    name: BKLF Maintenance Mode
    icon: mdi:wrench
  bklf_installer_mode:
    name: BKLF Installer Mode
    icon: mdi:tools

input_select:
  bklf_building_mode:
    name: BKLF Building Mode
    icon: mdi:office-building-cog
    options:
      - Closed
      - Open
      - Cleaning
      - Service
      - Maintenance

template:
  - binary_sensor:
      # Expected active contact IDs. Verify against live Home Assistant before production use.
      # Deferred operable-window contacts:
      # - East Wall Window 01 contact is deferred until additional contact sensors arrive.
      # - West Wall Window 01 contact is deferred until additional contact sensors arrive.
      # Future East Wall fixed picture window placeholders:
      # - Future impact/shock sensor placeholder 01.
      # - Future impact/shock sensor placeholder 02.
      - name: BKLF Exterior Secure
        unique_id: bklf_exterior_secure
        device_class: safety
        state: >
          {% set active_contacts = [
            'binary_sensor.c01_south_entrance_door',
            'binary_sensor.c02_east_door_left',
            'binary_sensor.c03_east_door_right',
            'binary_sensor.c04_west_door',
            'binary_sensor.c05_north_wall_window_1',
            'binary_sensor.c06_north_wall_window_2',
            'binary_sensor.c07_north_wall_window_3',
            'binary_sensor.c08_north_wall_window_4',
            'binary_sensor.c09_north_wall_window_5',
            'binary_sensor.c10_south_wall_window_1',
            'binary_sensor.c11_south_wall_window_2',
            'binary_sensor.c12_south_wall_window_3',
            'binary_sensor.c13_south_wall_window_4',
            'binary_sensor.c14_south_wall_window_5'
          ] %}
          {{ expand(active_contacts)
            | selectattr('state', 'eq', 'on')
            | list
            | count == 0 }}
        attributes:
          note: "Uses expected active contact entity IDs only. Verify live IDs before production use."
          deferred_operable_window_contacts: "East Wall Window 01 and West Wall Window 01"
          future_impact_shock_placeholders: "Two East Wall fixed picture windows"

      - name: BKLF Interior Motion Active
        unique_id: bklf_interior_motion_active
        device_class: motion
        state: >
          {% set motion_sensors = [
            'binary_sensor.m01_main_hallway_motion',
            'binary_sensor.m02_viewing_room_motion'
          ] %}
          {{ expand(motion_sensors)
            | selectattr('state', 'eq', 'on')
            | list
            | count > 0 }}
        attributes:
          note: "Uses expected motion entity IDs. Verify live IDs before production use."

      - name: BKLF South Entrance Active
        unique_id: bklf_south_entrance_active
        device_class: opening
        state: >
          {{ is_state('binary_sensor.c01_south_entrance_door', 'on') }}
        attributes:
          note: "Uses expected South Entrance contact entity ID. Verify live ID before production use."

      - name: BKLF Building Secure
        unique_id: bklf_building_secure
        device_class: safety
        state: >
          {{ is_state('binary_sensor.bklf_exterior_secure', 'on')
            and is_state('binary_sensor.bklf_interior_motion_active', 'off') }}
        attributes:
          note: "Initial status accounts for installed/assigned sensors only. Deferred and future sensors are documented placeholders."
