# BKLF security helpers and template status package.
#
# Live entity IDs are sourced from the exported BKLF Home Assistant registry.
# C09-C12 were finalized onsite after the initial handoff build. C13 and C14
# remain documented only and are not referenced by active customer-facing
# templates or dashboards.

input_boolean:
  bklf_building_armed:
    name: BKLF Building Armed
    icon: mdi:shield-home
  bklf_maintenance_mode:
    name: BKLF Maintenance Mode
    icon: mdi:wrench
  bklf_installer_mode:
    name: BKLF Installer Mode
    icon: mdi:tools

input_select:
  bklf_building_mode:
    name: BKLF Building Mode
    icon: mdi:office-building-cog
    options:
      - Closed
      - After Hours
      - Open
      - Cleaning
      - Service
      - Maintenance

template:
  - binary_sensor:
      - name: BKLF Exterior Secure
        unique_id: bklf_exterior_secure
        device_class: safety
        state: >
          {% set active_contacts = [
            'binary_sensor.c01_south_entrance_door',
            'binary_sensor.c05_north_wall_window_1',
            'binary_sensor.c06_north_wall_window_2',
            'binary_sensor.c07_north_wall_window_3',
            'binary_sensor.c08_north_wall_window_4',
            'binary_sensor.c09_west_service_door',
            'binary_sensor.c10_south_wall_window_1',
            'binary_sensor.c11_south_wall_window_2',
            'binary_sensor.c12_upstairs_back_porch_door'
          ] %}
          {{ expand(active_contacts)
            | rejectattr('state', 'eq', 'off')
            | list
            | count > 0 }}
        attributes:
          included_contacts: >
            C01 South Entrance, C05-C08 North Wall Windows, C09 West Service Door,
            C10 Front Double Door - Left, C11 Front Double Door - Right, and
            C12 Upstairs Back Porch Door.
          deferred_contacts: "C13 and C14 are intentionally deferred and not part of active secure status."
          future_window_sensors: "Two East Wall fixed picture windows are future sensor locations."
          future_front_double_door_lock: "Second Kwikset/Home Connect 620 lock is planned for the front double-door entrance after pairing. It is not active and does not affect secure status."

      - name: BKLF Interior Motion Active
        unique_id: bklf_interior_motion_active
        device_class: motion
        state: >
          {% set motion_sensors = [
            'binary_sensor.m01_main_hallway_motion',
            'binary_sensor.m02_viewing_room_motion'
          ] %}
          {{ expand(motion_sensors)
            | selectattr('state', 'eq', 'on')
            | list
            | count > 0 }}
        attributes:
          included_motion_sensors: "M01 Main Hallway Motion and M02 Viewing Room Motion."

      - name: BKLF South Entrance Active
        unique_id: bklf_south_entrance_active
        device_class: opening
        state: >
          {{ is_state('binary_sensor.c01_south_entrance_door', 'on')
            or is_state('binary_sensor.south_wall_south_entrance_doorbell_visitor', 'on')
            or is_state('binary_sensor.south_wall_south_entrance_doorbell_person', 'on')
            or is_state('binary_sensor.south_wall_south_entrance_doorbell_motion', 'on') }}
        attributes:
          door_contact: binary_sensor.c01_south_entrance_door
          doorbell_visitor: binary_sensor.south_wall_south_entrance_doorbell_visitor
          doorbell_person: binary_sensor.south_wall_south_entrance_doorbell_person
          doorbell_motion: binary_sensor.south_wall_south_entrance_doorbell_motion

      - name: BKLF CAM01 Person Active
        unique_id: bklf_cam01_person_active
        device_class: motion
        state: >
          {{ is_state('binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person', 'on')
            or is_state('binary_sensor.south_wall_cam01_southwest_corner_parking_lot_linger_area_1_person', 'on') }}
        attributes:
          camera: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
          person_sensor: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
          linger_area_person_sensor: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_linger_area_1_person

      - name: BKLF Building Secure
        unique_id: bklf_building_secure
        device_class: safety
        state: >
          {{ is_state('binary_sensor.bklf_exterior_secure', 'on')
            or is_state('binary_sensor.bklf_interior_motion_active', 'on')
            or not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') }}
        attributes:
          lock: lock.south_wall_home_connect_620_connected_smart_lock
          exterior_status: binary_sensor.bklf_exterior_secure
          motion_status: binary_sensor.bklf_interior_motion_active
