title: BKLF First Floor
views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    cards:
      - type: entities
        title: Building Status
        entities:
          - entity: binary_sensor.bklf_building_secure
            name: Building Secure
          - entity: binary_sensor.bklf_exterior_secure
            name: Exterior Secure
          - entity: binary_sensor.bklf_interior_motion_active
            name: Interior Motion
          - entity: binary_sensor.bklf_south_entrance_active
            name: South Entrance
          - entity: input_select.bklf_building_mode
            name: Building Mode
          - entity: input_boolean.bklf_building_armed
            name: Building Armed

      - type: glance
        title: Doors & Windows
        columns: 3
        entities:
          - entity: binary_sensor.c01_south_entrance_door
            name: South Entrance
          - entity: binary_sensor.east_door_left
            name: East Door Left
          - entity: binary_sensor.c03_east_door_right
            name: East Door Right
          - entity: binary_sensor.c04_west_door
            name: West Door
          - entity: binary_sensor.c05_north_wall_window_1
            name: North Window 1
          - entity: binary_sensor.c06_north_wall_window_2
            name: North Window 2
          - entity: binary_sensor.c07_north_wall_window_3
            name: North Window 3
          - entity: binary_sensor.c08_north_wall_window_4
            name: North Window 4
          - entity: binary_sensor.c10_south_wall_window_1
            name: South Window 1
          - entity: binary_sensor.c11_south_wall_window_2
            name: South Window 2

      - type: glance
        title: Interior Motion
        entities:
          - entity: binary_sensor.bklf_interior_motion_active
            name: Any Motion
          - entity: binary_sensor.m01_main_hallway_motion
            name: Main Hallway
          - entity: binary_sensor.m02_viewing_room_motion
            name: Viewing Room

      - type: entities
        title: South Entrance
        entities:
          - entity: binary_sensor.bklf_south_entrance_active
            name: Entrance Active
          - entity: binary_sensor.c01_south_entrance_door
            name: Door Status
          - entity: binary_sensor.south_wall_south_entrance_doorbell_visitor
            name: Doorbell
          - entity: binary_sensor.south_wall_south_entrance_doorbell_person
            name: Person Detected
          - entity: lock.south_wall_home_connect_620_connected_smart_lock
            name: Lock Control

      - type: logbook
        title: Recent Activity
        hours_to_show: 12
        entities:
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.east_door_left
          - binary_sensor.c03_east_door_right
          - binary_sensor.c04_west_door
          - binary_sensor.m01_main_hallway_motion
          - binary_sensor.m02_viewing_room_motion
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
          - lock.south_wall_home_connect_620_connected_smart_lock

  - title: Cameras
    path: cameras
    icon: mdi:cctv
    cards:
      - type: picture-entity
        title: Doorbell
        entity: camera.south_wall_south_entrance_doorbell_fluent
        camera_view: live
        show_state: true
        show_name: true

      - type: picture-entity
        title: Parking Lot Camera
        entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
        camera_view: live
        show_state: true
        show_name: true

      - type: entities
        title: Camera Activity
        entities:
          - entity: binary_sensor.south_wall_south_entrance_doorbell_visitor
            name: Doorbell
          - entity: binary_sensor.south_wall_south_entrance_doorbell_person
            name: Doorbell Person
          - entity: binary_sensor.south_wall_south_entrance_doorbell_motion
            name: Doorbell Motion
          - entity: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
            name: Parking Lot Person
          - entity: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_vehicle
            name: Parking Lot Vehicle
          - entity: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_motion
            name: Parking Lot Motion
          - entity: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_linger_area_1_person
            name: Parking Lot Area Person

  - title: Doorbell
    path: doorbell
    icon: mdi:doorbell-video
    cards:
      - type: markdown
        title: South Entrance
        content: >
          When someone is at the door, view the live doorbell camera first. Then
          use Lock Control to unlock or lock the South Entrance.

      - type: picture-entity
        title: Doorbell
        entity: camera.south_wall_south_entrance_doorbell_fluent
        camera_view: live
        show_state: true
        show_name: true

      - type: lock
        entity: lock.south_wall_home_connect_620_connected_smart_lock
        name: Lock Control

      - type: entities
        title: Doorbell Activity
        entities:
          - entity: binary_sensor.south_wall_south_entrance_doorbell_visitor
            name: Doorbell
          - entity: binary_sensor.south_wall_south_entrance_doorbell_person
            name: Person Detected
          - entity: binary_sensor.south_wall_south_entrance_doorbell_motion
            name: Motion Detected
          - entity: binary_sensor.c01_south_entrance_door
            name: Door Status
          - entity: lock.south_wall_home_connect_620_connected_smart_lock
            name: Lock Status

      - type: logbook
        title: Recent Doorbell Activity
        hours_to_show: 12
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - binary_sensor.south_wall_south_entrance_doorbell_motion
          - lock.south_wall_home_connect_620_connected_smart_lock

  - title: Entrances
    path: entrances
    icon: mdi:door
    cards:
      - type: entities
        title: South Entrance
        entities:
          - entity: binary_sensor.bklf_south_entrance_active
            name: Entrance Active
          - entity: binary_sensor.c01_south_entrance_door
            name: Door Status
          - entity: lock.south_wall_home_connect_620_connected_smart_lock
            name: Lock Control
          - entity: binary_sensor.south_wall_south_entrance_doorbell_visitor
            name: Doorbell

      - type: entities
        title: East Double Doors
        entities:
          - entity: binary_sensor.east_door_left
            name: Left Door
          - entity: binary_sensor.c03_east_door_right
            name: Right Door

      - type: entities
        title: West Door
        entities:
          - entity: binary_sensor.c04_west_door
            name: West Door

      - type: history-graph
        title: Entrance Activity
        hours_to_show: 12
        entities:
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.east_door_left
          - binary_sensor.c03_east_door_right
          - binary_sensor.c04_west_door

  - title: Motion
    path: motion
    icon: mdi:motion-sensor
    cards:
      - type: entities
        title: Interior Motion
        entities:
          - entity: binary_sensor.bklf_interior_motion_active
            name: Any Interior Motion
          - entity: binary_sensor.m01_main_hallway_motion
            name: Main Hallway
          - entity: binary_sensor.m02_viewing_room_motion
            name: Viewing Room

      - type: entities
        title: Doorbell Motion
        entities:
          - entity: binary_sensor.south_wall_south_entrance_doorbell_motion
            name: Doorbell Motion
          - entity: binary_sensor.south_wall_south_entrance_doorbell_person
            name: Doorbell Person

      - type: entities
        title: Parking Lot Activity
        entities:
          - entity: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_motion
            name: Parking Lot Motion
          - entity: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
            name: Parking Lot Person
          - entity: binary_sensor.bklf_cam01_person_active
            name: Parking Lot Person Summary

      - type: history-graph
        title: Motion History
        hours_to_show: 24
        entities:
          - binary_sensor.m01_main_hallway_motion
          - binary_sensor.m02_viewing_room_motion
          - binary_sensor.south_wall_south_entrance_doorbell_motion
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_motion

  - title: Lock
    path: lock
    icon: mdi:lock-smart
    cards:
      - type: lock
        entity: lock.south_wall_home_connect_620_connected_smart_lock
        name: Lock Control

      - type: entities
        title: Lock and Door Status
        entities:
          - entity: lock.south_wall_home_connect_620_connected_smart_lock
            name: Lock Status
          - entity: binary_sensor.c01_south_entrance_door
            name: Door Status
          - entity: sensor.south_wall_home_connect_620_connected_smart_lock_battery_level
            name: Lock Battery
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_lock_jammed
            name: Lock Jam
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_replace_battery_soon
            name: Battery Review Soon
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_replace_battery_now
            name: Battery Review Now

      - type: history-graph
        title: Lock and Door History
        hours_to_show: 12
        entities:
          - lock.south_wall_home_connect_620_connected_smart_lock
          - binary_sensor.c01_south_entrance_door

  - title: System Ready
    path: system-ready
    icon: mdi:heart-pulse
    cards:
      - type: entities
        title: System Ready
        entities:
          - entity: binary_sensor.bklf_building_secure
            name: Building Secure
          - entity: binary_sensor.bklf_exterior_secure
            name: Exterior Secure

      - type: entities
        title: Batteries
        entities:
          - entity: sensor.c01_south_entrance_door_battery
            name: South Entrance Door
          - entity: sensor.east_door_left_battery
            name: East Door Left
          - entity: sensor.c03_east_door_right_battery
            name: East Door Right
          - entity: sensor.c04_west_door_battery
            name: West Door
          - entity: sensor.c05_north_wall_window_1_battery
            name: North Window 1
          - entity: sensor.c06_north_wall_window_2_battery
            name: North Window 2
          - entity: sensor.c07_north_wall_window_3_battery
            name: North Window 3
          - entity: sensor.c08_north_wall_window_4_battery
            name: North Window 4
          - entity: sensor.c10_south_wall_window_1_battery
            name: South Window 1
          - entity: sensor.c11_south_wall_window_2_battery
            name: South Window 2
          - entity: sensor.m01_main_hallway_motion_battery
            name: Main Hallway Motion
          - entity: sensor.m02_viewing_room_motion_battery
            name: Viewing Room Motion
          - entity: sensor.south_wall_home_connect_620_connected_smart_lock_battery_level
            name: Lock Battery

      - type: entities
        title: Installed Devices
        entities:
          - entity: lock.south_wall_home_connect_620_connected_smart_lock
            name: South Entrance Lock
          - entity: camera.south_wall_south_entrance_doorbell_fluent
            name: Doorbell
          - entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
            name: Parking Lot Camera
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_lock_jammed
            name: Lock Jam
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_replace_battery_soon
            name: Battery Review Soon
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_replace_battery_now
            name: Battery Review Now
