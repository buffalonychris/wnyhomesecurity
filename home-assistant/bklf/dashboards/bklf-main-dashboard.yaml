          - type: custom:button-card
            name: Doorbell
            icon: mdi:doorbell-video
            tap_action:
              action: navigate
              navigation_path: /bklf-main/doorbell
            styles: *nav_button
          - type: custom:button-card
            name: Cameras
            icon: mdi:cctv
            tap_action:
              action: navigate
              navigation_path: /bklf-main/cameras
            styles: *nav_button
          - type: custom:button-card
            name: Locks
            icon: mdi:lock
            tap_action:
              action: navigate
              navigation_path: /bklf-main/locks
            styles: *nav_button
          - type: custom:button-card
            name: More
            icon: mdi:dots-horizontal
            tap_action:
              action: navigate
              navigation_path: /bklf-main/more
            styles: *nav_button

  - title: Locks
    path: locks
    icon: mdi:lock
    cards:
      - type: custom:button-card
        entity: lock.south_wall_home_connect_620_connected_smart_lock
        name: >-
          [[[
            return entity.state === 'locked' ? 'Locked' : 'Unlocked';
          ]]]
        label: South Entrance / Front Entry
        icon: >-
          [[[
            return entity.state === 'locked' ? 'mdi:lock' : 'mdi:lock-open-variant';
          ]]]
        show_label: true
        tap_action:
          action: more-info
        styles:
          card:
            - min-height: 190px
            - border-radius: 28px
            - padding: 24px
            - background: var(--ha-card-background)
            - border: 1px solid var(--wnyhs-card-border)
            - box-shadow: var(--ha-card-box-shadow)
          icon:
            - width: 66px
            - color: >-
                [[[
                  return entity.state === 'locked' ? 'var(--wnyhs-lock-color)' : 'var(--wnyhs-unlock-color)';
                ]]]
          name:
            - font-size: 32px
            - font-weight: 800
            - color: var(--primary-text-color)
          label:
            - font-size: 15px
            - color: var(--secondary-text-color)

      - type: custom:mushroom-template-card
        primary: >-
          {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
            Door is open
          {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
            Lock needs review
          {% else %}
            Door is closed and locked
          {% endif %}
        secondary: >-
          {% if is_state('binary_sensor.south_wall_home_connect_620_connected_smart_lock_lock_jammed', 'on') %}
            Lock needs review
          {% else %}
            Ready for normal use
          {% endif %}
        icon: mdi:door-closed-lock
        icon_color: >-
          {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
            amber
          {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
            red
          {% else %}
            green
          {% endif %}

      - type: horizontal-stack
