title: WNYHS Customer Control Center
views:
  - title: Home
    path: home
    icon: mdi:home
    type: masonry
    max_columns: 1
    cards:
      - type: custom:button-card
        name: WNY Home Security
        label: BK Lewis Funeral Home
        icon: mdi:shield-home
        show_label: true
        tap_action:
          action: navigate
          navigation_path: /bklf-main/more
        styles:
          card:
            - min-height: 96px
            - border-radius: 24px
            - padding: 18px
            - background: linear-gradient(135deg, var(--wnyhs-card-background), var(--wnyhs-secondary-button-background))
            - border: 1px solid var(--wnyhs-gold)
            - border-left: 5px solid var(--wnyhs-gold)
            - box-shadow: var(--ha-card-box-shadow)
          grid:
            - grid-template-areas: '"i n" "i l"'
            - grid-template-columns: 56px 1fr
            - grid-template-rows: min-content min-content
          icon:
            - width: 42px
            - color: var(--wnyhs-gold)
          name:
            - justify-self: start
            - font-size: 23px
            - font-weight: 800
            - color: var(--primary-text-color)
          label:
            - justify-self: start
            - font-size: 14px
            - color: var(--secondary-text-color)

      - type: custom:button-card
        entity: binary_sensor.bklf_building_secure
        name: >-
          [[[
            const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
            const mode = states['input_select.bklf_building_mode']?.state || '';
            const doorbell = states['binary_sensor.south_wall_south_entrance_doorbell_visitor']?.state === 'on'
              || states['binary_sensor.south_wall_south_entrance_doorbell_person']?.state === 'on';
            const unlocked = states['lock.south_wall_home_connect_620_connected_smart_lock']?.state !== 'locked';
            if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'Check Now';
            if (doorbell || unlocked || entity.state === 'on') return 'Please Check the Building';
            return 'Everything Looks Good';
          ]]]
        label: >-
          [[[
            const doorbell = states['binary_sensor.south_wall_south_entrance_doorbell_visitor']?.state === 'on'
              || states['binary_sensor.south_wall_south_entrance_doorbell_person']?.state === 'on';
            const unlocked = states['lock.south_wall_home_connect_620_connected_smart_lock']?.state !== 'locked';
            const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
            const mode = states['input_select.bklf_building_mode']?.state || '';
            if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'Review cameras and security details.';
            if (doorbell) return 'Someone is at the door.';
            if (unlocked) return 'Front Entrance Unlocked';
            if (entity.state === 'on') return 'One or more areas need attention.';
            return 'All reviewed areas are secure and operating normally.';
          ]]]
        icon: >-
          [[[
            const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
            const mode = states['input_select.bklf_building_mode']?.state || '';
            if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'mdi:alert-octagon';
            if (entity.state === 'on') return 'mdi:shield-alert';
            return 'mdi:shield-check';
          ]]]
        show_label: true
        tap_action:
          action: navigate
          navigation_path: /bklf-main/security
        styles:
          card:
            - min-height: 204px
            - border-radius: 32px
            - padding: 28px
            - background: >-
                [[[
                  const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
                  const mode = states['input_select.bklf_building_mode']?.state || '';
                  if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'var(--wnyhs-emergency-background)';
                  if (entity.state === 'on') return 'var(--wnyhs-secondary-button-background)';
                  return 'linear-gradient(135deg, var(--wnyhs-card-background), var(--wnyhs-secondary-button-background))';
                ]]]
            - border: >-
                [[[
                  const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
                  const mode = states['input_select.bklf_building_mode']?.state || '';
                  if (motion && (mode === 'Closed' || mode === 'After Hours')) return '1px solid var(--wnyhs-emergency-border)';
                  if (entity.state === 'on') return '1px solid var(--warning-color)';
                  return '2px solid var(--wnyhs-lock-color)';
                ]]]
            - border-left: >-
                [[[
                  const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
                  const mode = states['input_select.bklf_building_mode']?.state || '';
                  if (motion && (mode === 'Closed' || mode === 'After Hours')) return '6px solid var(--wnyhs-unlock-color)';
                  if (entity.state === 'on') return '6px solid var(--wnyhs-gold)';
                  return '6px solid var(--wnyhs-lock-color)';
                ]]]
            - box-shadow: var(--ha-card-box-shadow)
          grid:
            - grid-template-areas: '"i" "n" "l"'
            - grid-template-columns: 1fr
            - grid-template-rows: min-content min-content min-content
          icon:
            - width: 70px
            - margin-bottom: 10px
            - color: >-
                [[[
                  const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
                  const mode = states['input_select.bklf_building_mode']?.state || '';
                  if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'var(--wnyhs-emergency-border)';
                  if (entity.state === 'on') return 'var(--warning-color)';
                  return 'var(--wnyhs-lock-color)';
                ]]]
          name:
            - justify-self: start
            - font-size: 31px
            - font-weight: 800
            - line-height: 1.05
            - color: var(--primary-text-color)
          label:
            - justify-self: start
            - font-size: 16px
            - line-height: 1.35
            - color: var(--secondary-text-color)

      - type: vertical-stack
        title: Front Door
        cards:
          - type: picture-entity
            entity: camera.south_wall_south_entrance_doorbell_fluent
            camera_view: live
            show_name: false
            show_state: false
            aspect_ratio: 16x9
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border-radius: 28px;
                  overflow: hidden;
                  border: 1px solid var(--wnyhs-gold);
                  background: var(--wnyhs-card-background);
                  box-shadow: var(--ha-card-box-shadow);
                }
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Talk
                icon: mdi:microphone
                tap_action:
                  action: more-info
                  entity: camera.south_wall_south_entrance_doorbell_fluent
                styles: &positive_button
                  card:
                    - min-height: 68px
                    - border-radius: 20px
                    - background: var(--wnyhs-secondary-button-background)
                    - border: 1px solid var(--wnyhs-lock-color)
                    - color: var(--primary-text-color)
                    - box-shadow: var(--ha-card-box-shadow)
                  name:
                    - color: var(--primary-text-color)
                    - font-weight: 800
                  icon:
                    - color: var(--wnyhs-lock-color)
              - type: custom:button-card
                name: Unlock
                icon: mdi:lock-open-variant
                confirmation:
                  text: Unlock the front entry?
                tap_action:
                  action: call-service
                  service: lock.unlock
                  target:
                    entity_id: lock.south_wall_home_connect_620_connected_smart_lock
                styles: &caution_button
                  card:
                    - min-height: 68px
                    - border-radius: 20px
                    - background: var(--wnyhs-emergency-background)
                    - border: 1px solid var(--wnyhs-unlock-color)
                    - border-left: 5px solid var(--wnyhs-unlock-color)
                    - box-shadow: var(--ha-card-box-shadow)
                  name:
                    - color: var(--wnyhs-emergency-text)
                    - font-weight: 800
                  icon:
                    - color: var(--wnyhs-unlock-color)
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Lock
                icon: mdi:lock
                tap_action:
                  action: call-service
                  service: lock.lock
                  target:
                    entity_id: lock.south_wall_home_connect_620_connected_smart_lock
                styles: &safe_button
                  card:
                    - min-height: 62px
                    - border-radius: 20px
                    - background: var(--wnyhs-secondary-button-background)
                    - border: 1px solid var(--wnyhs-lock-color)
                    - box-shadow: var(--ha-card-box-shadow)
                  name:
                    - color: var(--primary-text-color)
                    - font-weight: 800
                  icon:
                    - color: var(--wnyhs-lock-color)
              - type: custom:button-card
                name: View
                icon: mdi:fullscreen
                tap_action:
                  action: more-info
                  entity: camera.south_wall_south_entrance_doorbell_fluent
                styles: &neutral_gold_button
                  card:
                    - min-height: 62px
                    - border-radius: 20px
                    - background: var(--wnyhs-secondary-button-background)
                    - border: 1px solid var(--wnyhs-gold)
                    - box-shadow: var(--ha-card-box-shadow)
                  name:
                    - color: var(--primary-text-color)
                    - font-weight: 800
                  icon:
                    - color: var(--wnyhs-gold)
          - type: custom:mushroom-template-card
            primary: Door is closed and locked
            secondary: >-
              {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
                Door is open
              {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
                Lock needs review
              {% else %}
                Ready for normal use
              {% endif %}
            icon: mdi:door-closed-lock
            icon_color: >-
              {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
                amber
              {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
                red
              {% else %}
                green
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /bklf-main/doorbell
            card_mod:
              style: &status_card_style |
                ha-card {
                  border-radius: 22px;
                  border: 1px solid var(--wnyhs-card-border);
                  border-left: 5px solid var(--wnyhs-gold);
                  background: var(--wnyhs-card-background);
                  min-height: 92px;
                  box-shadow: var(--ha-card-box-shadow);
                }

      - type: vertical-stack
        title: Cameras
        cards:
          - type: picture-entity
            entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
            name: Parking Lot
            camera_view: live
            show_state: false
            aspect_ratio: 16x9
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border-radius: 28px;
                  overflow: hidden;
                  border: 1px solid var(--wnyhs-card-border);
                  background: var(--wnyhs-card-background);
                  box-shadow: var(--ha-card-box-shadow);
                }
          - type: custom:button-card
            name: View Cameras
            icon: mdi:cctv
            tap_action:
              action: navigate
              navigation_path: /bklf-main/cameras
            styles: &gold_button
              card:
                - min-height: 68px
                - border-radius: 20px
                - background: var(--wnyhs-gold)
                - color: var(--wnyhs-near-black)
                - box-shadow: var(--ha-card-box-shadow)
              name:
                - color: var(--wnyhs-near-black)
                - font-weight: 800
              icon:
                - color: var(--wnyhs-near-black)

      - type: custom:mushroom-template-card
        primary: System Status
        secondary: >-
          {% set exterior_attention = is_state('binary_sensor.bklf_exterior_secure', 'on') %}
          {% set motion_active = is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
          {% set lock_ready = is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
          {% if exterior_attention or motion_active or not lock_ready %}
            One or more areas need attention.
          {% else %}
            Doors closed, motion clear, front entry locked.
          {% endif %}
        icon: mdi:shield-check
        icon_color: >-
          {% if is_state('binary_sensor.bklf_building_secure', 'on') %}
            amber
          {% else %}
            green
          {% endif %}
        tap_action:
          action: navigate
          navigation_path: /bklf-main/security
        card_mod:
          style: *status_card_style

      - type: logbook
        title: Recent Activity
        hours_to_show: 12
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - lock.south_wall_home_connect_620_connected_smart_lock
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_vehicle
        card_mod:
          style: &activity_card_style |
            ha-card {
              border-radius: 24px;
              border: 1px solid var(--wnyhs-gold);
              border-left: 5px solid var(--wnyhs-gold);
              background: var(--wnyhs-card-background);
              box-shadow: var(--ha-card-box-shadow);
            }

  - title: Doorbell
    path: doorbell
    icon: mdi:doorbell-video
    type: masonry
    max_columns: 1
    cards:
      - type: custom:button-card
        name: Front Door
        label: Doorbell, talk, and front entry access
        icon: mdi:doorbell-video
        show_label: true
        styles:
          card:
            - min-height: 112px
            - border-radius: 26px
            - padding: 22px
            - background: linear-gradient(135deg, var(--wnyhs-card-background), var(--wnyhs-secondary-button-background))
            - border: 1px solid var(--wnyhs-gold)
            - border-left: 5px solid var(--wnyhs-gold)
            - box-shadow: var(--ha-card-box-shadow)
          icon:
            - width: 46px
            - color: var(--wnyhs-gold)
          name:
            - font-size: 25px
            - font-weight: 800
          label:
            - color: var(--secondary-text-color)

      - type: picture-entity
        entity: camera.south_wall_south_entrance_doorbell_fluent
        camera_view: live
        show_name: false
        show_state: false
        aspect_ratio: 4x3
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 30px;
              overflow: hidden;
              border: 1px solid var(--wnyhs-gold);
              background: var(--wnyhs-card-background);
              box-shadow: var(--ha-card-box-shadow);
            }

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Talk
            icon: mdi:microphone
            tap_action:
              action: more-info
              entity: camera.south_wall_south_entrance_doorbell_fluent
            styles: *positive_button
          - type: custom:button-card
            name: View
            icon: mdi:fullscreen
            tap_action:
              action: more-info
              entity: camera.south_wall_south_entrance_doorbell_fluent
            styles: *neutral_gold_button

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Unlock
            icon: mdi:lock-open-variant
            confirmation:
              text: Unlock the front entry?
            tap_action:
              action: call-service
              service: lock.unlock
              target:
                entity_id: lock.south_wall_home_connect_620_connected_smart_lock
            styles: *caution_button
          - type: custom:button-card
            name: Lock
            icon: mdi:lock
            tap_action:
              action: call-service
              service: lock.lock
              target:
                entity_id: lock.south_wall_home_connect_620_connected_smart_lock
            styles: *safe_button

      - type: custom:mushroom-template-card
        primary: >-
          {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
            Door is open
          {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
            Lock needs review
          {% else %}
            Door is closed and locked
          {% endif %}
        secondary: South Entrance / Front Entry
        icon: mdi:door-closed-lock
        icon_color: >-
          {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
            amber
          {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
            red
          {% else %}
            green
          {% endif %}
        card_mod:
          style: *status_card_style

      - type: logbook
        title: Recent Visitor Activity
        hours_to_show: 12
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - binary_sensor.south_wall_south_entrance_doorbell_motion
          - lock.south_wall_home_connect_620_connected_smart_lock
        card_mod:
          style: *activity_card_style

  - title: Cameras
    path: cameras
    icon: mdi:cctv
    type: masonry
    max_columns: 1
    cards:
      - type: custom:button-card
        name: Cameras
        label: Doorbell first, parking lot next
        icon: mdi:cctv
        show_label: true
        styles:
          card:
            - min-height: 112px
            - border-radius: 26px
            - padding: 22px
            - background: linear-gradient(135deg, var(--wnyhs-card-background), var(--wnyhs-secondary-button-background))
            - border: 1px solid var(--wnyhs-gold)
            - border-left: 5px solid var(--wnyhs-gold)
            - box-shadow: var(--ha-card-box-shadow)
          icon:
            - width: 46px
            - color: var(--wnyhs-gold)
          name:
            - font-size: 25px
            - font-weight: 800
          label:
            - color: var(--secondary-text-color)

      - type: picture-entity
        entity: camera.south_wall_south_entrance_doorbell_fluent
        name: Front Entrance
        camera_view: live
        show_state: false
        aspect_ratio: 16x9
        tap_action:
          action: more-info
        card_mod:
          style: &camera_card_style |
            ha-card {
              border-radius: 28px;
              overflow: hidden;
              border: 1px solid var(--wnyhs-gold);
              background: var(--wnyhs-card-background);
              box-shadow: var(--ha-card-box-shadow);
            }

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Live
            icon: mdi:record-circle
            tap_action:
              action: more-info
              entity: camera.south_wall_south_entrance_doorbell_fluent
            styles: &live_badge
              card:
                - min-height: 54px
                - border-radius: 999px
                - background: var(--wnyhs-secondary-button-background)
                - border: 1px solid var(--wnyhs-lock-color)
                - box-shadow: var(--ha-card-box-shadow)
              name:
                - color: var(--primary-text-color)
                - font-weight: 800
              icon:
                - color: var(--wnyhs-lock-color)
          - type: custom:button-card
            name: Talk
            icon: mdi:microphone
            tap_action:
              action: more-info
              entity: camera.south_wall_south_entrance_doorbell_fluent
            styles: *positive_button

      - type: picture-entity
        entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
        name: Parking Lot
        camera_view: live
        show_state: false
        aspect_ratio: 16x9
        tap_action:
          action: more-info
        card_mod:
          style: *camera_card_style

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Live
            icon: mdi:record-circle
            tap_action:
              action: more-info
              entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
            styles: *live_badge
          - type: custom:button-card
            name: View
            icon: mdi:fullscreen
            tap_action:
              action: more-info
              entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
            styles: *neutral_gold_button

      - type: logbook
        title: Camera Activity
        hours_to_show: 12
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_vehicle
          - binary_sensor.bklf_cam01_person_active
        card_mod:
          style: *activity_card_style

  - title: Locks
    path: locks
    icon: mdi:lock
    type: masonry
    max_columns: 1
    cards:
      - type: custom:button-card
        entity: lock.south_wall_home_connect_620_connected_smart_lock
        name: >-
          [[[
            return entity.state === 'locked' ? 'Locked' : 'Unlocked';
          ]]]
        label: >-
          [[[
            return entity.state === 'locked'
              ? 'South Entrance is closed and locked.'
              : 'Please check the front entry.';
          ]]]
        icon: >-
          [[[
            return entity.state === 'locked' ? 'mdi:lock' : 'mdi:lock-open-variant';
          ]]]
        show_label: true
        tap_action:
          action: more-info
        styles:
          card:
            - min-height: 220px
            - border-radius: 32px
            - padding: 30px
            - background: >-
                [[[
                  return entity.state === 'locked'
                    ? 'linear-gradient(135deg, var(--wnyhs-card-background), var(--wnyhs-secondary-button-background))'
                    : 'var(--wnyhs-emergency-background)';
                ]]]
            - border: >-
                [[[
                  return entity.state === 'locked'
                    ? '1px solid var(--wnyhs-lock-color)'
                    : '1px solid var(--wnyhs-unlock-color)';
                ]]]
            - border-left: >-
                [[[
                  return entity.state === 'locked'
                    ? '6px solid var(--wnyhs-lock-color)'
                    : '6px solid var(--wnyhs-unlock-color)';
                ]]]
            - box-shadow: var(--ha-card-box-shadow)
          icon:
            - width: 86px
            - color: >-
                [[[
                  return entity.state === 'locked' ? 'var(--wnyhs-lock-color)' : 'var(--wnyhs-unlock-color)';
                ]]]
          name:
            - font-size: 36px
            - font-weight: 800
            - color: var(--primary-text-color)
          label:
            - font-size: 16px
            - line-height: 1.35
            - color: var(--secondary-text-color)

      - type: custom:mushroom-template-card
        primary: >-
          {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
            Door is open
          {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
            Lock needs review
          {% else %}
            Door is closed and locked
          {% endif %}
        secondary: >-
          {% if is_state('binary_sensor.south_wall_home_connect_620_connected_smart_lock_lock_jammed', 'on') %}
            Lock needs review
          {% else %}
            Ready for normal use
          {% endif %}
        icon: mdi:door-closed-lock
        icon_color: >-
          {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
            amber
          {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
            red
          {% else %}
            green
          {% endif %}
        card_mod:
          style: *status_card_style

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Unlock
            icon: mdi:lock-open-variant
            confirmation:
              text: Unlock the front entry?
            tap_action:
              action: call-service
              service: lock.unlock
              target:
                entity_id: lock.south_wall_home_connect_620_connected_smart_lock
            styles: *caution_button
          - type: custom:button-card
            name: Lock
            icon: mdi:lock
            tap_action:
              action: call-service
              service: lock.lock
              target:
                entity_id: lock.south_wall_home_connect_620_connected_smart_lock
            styles: *safe_button

      - type: logbook
        title: Recent Access Activity
        hours_to_show: 12
        entities:
          - lock.south_wall_home_connect_620_connected_smart_lock
          - binary_sensor.c01_south_entrance_door
        card_mod:
          style: *activity_card_style

  - title: Security
    path: security
    icon: mdi:shield-check
    type: masonry
    max_columns: 1
    cards:
      - type: custom:button-card
        entity: binary_sensor.bklf_building_secure
        name: >-
          [[[
            return entity.state === 'on' ? 'Please Check the Building' : 'Everything Looks Good';
          ]]]
        label: >-
          [[[
            return entity.state === 'on'
              ? 'One or more areas need attention.'
              : 'Reviewed areas are secure and motion is clear.';
          ]]]
        icon: mdi:shield-check
        show_label: true
        tap_action:
          action: more-info
        styles:
          card:
            - min-height: 180px
            - border-radius: 30px
            - padding: 26px
            - background: >-
                [[[
                  return entity.state === 'on'
                    ? 'var(--wnyhs-secondary-button-background)'
                    : 'linear-gradient(135deg, var(--wnyhs-card-background), var(--wnyhs-secondary-button-background))';
                ]]]
            - border: >-
                [[[
                  return entity.state === 'on' ? '1px solid var(--warning-color)' : '1px solid var(--wnyhs-lock-color)';
                ]]]
            - border-left: >-
                [[[
                  return entity.state === 'on' ? '6px solid var(--wnyhs-gold)' : '6px solid var(--wnyhs-lock-color)';
                ]]]
            - box-shadow: var(--ha-card-box-shadow)
          icon:
            - width: 64px
            - color: >-
                [[[
                  return entity.state === 'on' ? 'var(--warning-color)' : 'var(--wnyhs-lock-color)';
                ]]]
          name:
            - font-size: 28px
            - font-weight: 800
          label:
            - font-size: 15px
            - color: var(--secondary-text-color)

      - type: vertical-stack
        title: Doors And Windows
        cards:
          - type: custom:mushroom-template-card
            primary: Exterior Doors
            secondary: >-
              {% if is_state('binary_sensor.bklf_exterior_secure', 'on') %}
                Please Check the Building
              {% else %}
                All reviewed openings secure
              {% endif %}
            icon: mdi:door-closed-lock
            icon_color: >-
              {% if is_state('binary_sensor.bklf_exterior_secure', 'on') %}
                amber
              {% else %}
                green
              {% endif %}
            tap_action:
              action: more-info
              entity: binary_sensor.bklf_exterior_secure
            card_mod:
              style: *status_card_style
          - type: custom:mushroom-template-card
            primary: South Entrance
            secondary: >-
              {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
                Door is open
              {% else %}
                Closed
              {% endif %}
            icon: mdi:door
            icon_color: >-
              {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
                amber
              {% else %}
                green
              {% endif %}
            tap_action:
              action: more-info
              entity: binary_sensor.c01_south_entrance_door
            card_mod:
              style: *status_card_style
          - type: custom:mushroom-template-card
            primary: Front Double Doors
            secondary: >-
              {% if is_state('binary_sensor.c10_south_wall_window_1', 'on') or is_state('binary_sensor.c11_south_wall_window_2', 'on') %}
                Please Check the Building
              {% else %}
                Closed
              {% endif %}
            icon: mdi:door-sliding-lock
            icon_color: >-
              {% if is_state('binary_sensor.c10_south_wall_window_1', 'on') or is_state('binary_sensor.c11_south_wall_window_2', 'on') %}
                amber
              {% else %}
                green
              {% endif %}
            card_mod:
              style: *status_card_style
          - type: custom:mushroom-template-card
            primary: North Windows
            secondary: >-
              {% if is_state('binary_sensor.c05_north_wall_window_1', 'on')
                or is_state('binary_sensor.c06_north_wall_window_2', 'on')
                or is_state('binary_sensor.c07_north_wall_window_3', 'on')
                or is_state('binary_sensor.c08_north_wall_window_4', 'on') %}
                Please Check the Building
              {% else %}
                All reviewed windows secure
              {% endif %}
            icon: mdi:window-closed-variant
            icon_color: >-
              {% if is_state('binary_sensor.c05_north_wall_window_1', 'on')
                or is_state('binary_sensor.c06_north_wall_window_2', 'on')
                or is_state('binary_sensor.c07_north_wall_window_3', 'on')
                or is_state('binary_sensor.c08_north_wall_window_4', 'on') %}
                amber
              {% else %}
                green
              {% endif %}
            card_mod:
              style: *status_card_style

      - type: custom:mushroom-template-card
        primary: >-
          {% if is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
            Motion Detected
          {% else %}
            Interior Motion
          {% endif %}
        secondary: >-
          {% if is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
            Attention
          {% else %}
            Clear
          {% endif %}
        icon: >-
          {% if is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
            mdi:motion-sensor
          {% else %}
            mdi:shield-check
          {% endif %}
        icon_color: >-
          {% if is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
            amber
          {% else %}
            green
          {% endif %}
        tap_action:
          action: more-info
          entity: binary_sensor.bklf_interior_motion_active
        card_mod:
          style: *status_card_style

      - type: custom:mushroom-template-card
        primary: Front Entry Lock
        secondary: >-
          {% if is_state('binary_sensor.south_wall_home_connect_620_connected_smart_lock_lock_jammed', 'on') %}
            Lock needs review
          {% elif is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
            Locked
          {% else %}
            Please check the front entry.
          {% endif %}
        icon: mdi:lock
        icon_color: >-
          {% if is_state('binary_sensor.south_wall_home_connect_620_connected_smart_lock_lock_jammed', 'on') %}
            amber
          {% elif is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
            green
          {% else %}
            red
          {% endif %}
        tap_action:
          action: navigate
          navigation_path: /bklf-main/locks
        card_mod:
          style: *status_card_style

      - type: custom:mushroom-template-card
        primary: System Status
        secondary: >-
          {% if is_state('binary_sensor.bklf_building_secure', 'on') %}
            Please Check the Building
          {% else %}
            Ready for normal use
          {% endif %}
        icon: mdi:shield-home
        icon_color: >-
          {% if is_state('binary_sensor.bklf_building_secure', 'on') %}
            amber
          {% else %}
            green
          {% endif %}
        card_mod:
          style: *status_card_style

  - title: Activity
    path: activity
    icon: mdi:history
    type: masonry
    max_columns: 1
    cards:
      - type: custom:button-card
        name: Recent Activity
        label: Visitor, camera, lock, and door activity
        icon: mdi:history
        show_label: true
        styles:
          card:
            - min-height: 112px
            - border-radius: 26px
            - padding: 22px
            - background: linear-gradient(135deg, var(--wnyhs-card-background), var(--wnyhs-secondary-button-background))
            - border: 1px solid var(--wnyhs-gold)
            - border-left: 5px solid var(--wnyhs-gold)
            - box-shadow: var(--ha-card-box-shadow)
          icon:
            - width: 46px
            - color: var(--wnyhs-gold)
          name:
            - font-size: 25px
            - font-weight: 800
          label:
            - color: var(--secondary-text-color)

      - type: logbook
        title: Today
        hours_to_show: 24
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - lock.south_wall_home_connect_620_connected_smart_lock
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.c09_west_service_door
          - binary_sensor.c10_south_wall_window_1
          - binary_sensor.c11_south_wall_window_2
          - binary_sensor.c12_upstairs_back_porch_door
          - binary_sensor.m01_main_hallway_motion
          - binary_sensor.m02_viewing_room_motion
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_vehicle
        card_mod:
          style: *activity_card_style

  - title: More
    path: more
    icon: mdi:dots-horizontal-circle
    type: masonry
    max_columns: 1
    cards:
      - type: custom:button-card
        name: WNY Home Security
        label: Customer Control Center
        icon: mdi:shield-home
