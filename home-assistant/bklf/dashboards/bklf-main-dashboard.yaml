      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Home
            icon: mdi:home
            tap_action:
              action: navigate
              navigation_path: /bklf-main/home
            styles: *nav_button
          - type: custom:button-card
            name: Doorbell
            icon: mdi:doorbell-video
            tap_action:
              action: navigate
              navigation_path: /bklf-main/doorbell
            styles: *nav_button
          - type: custom:button-card
            name: Cameras
            icon: mdi:cctv
            tap_action:
              action: navigate
