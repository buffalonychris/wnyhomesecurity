title: WNYHS Customer Control Center
views:
  - title: Home
    path: home
    icon: mdi:home
    cards:
      - type: custom:button-card
        name: WNY Home Security
        label: BK Lewis Funeral Home - Customer Control Center
        icon: mdi:shield-home
        show_label: true
        tap_action:
          action: navigate
          navigation_path: /bklf-main/more
        styles:
          card:
            - min-height: 96px
            - border-radius: 24px
            - padding: 18px
            - background: var(--ha-card-background)
            - border: 1px solid var(--wnyhs-card-border)
            - box-shadow: var(--ha-card-box-shadow)
          grid:
            - grid-template-areas: '"i n" "i l"'
            - grid-template-columns: 58px 1fr
            - grid-template-rows: min-content min-content
          icon:
            - width: 42px
            - color: var(--wnyhs-gold)
          name:
            - justify-self: start
            - font-size: 23px
            - font-weight: 800
            - color: var(--primary-text-color)
          label:
            - justify-self: start
            - font-size: 13px
            - color: var(--secondary-text-color)

      - type: custom:button-card
        entity: binary_sensor.bklf_building_secure
        name: >-
          [[[
            const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
            const mode = states['input_select.bklf_building_mode']?.state || '';
            const doorbell = states['binary_sensor.south_wall_south_entrance_doorbell_visitor']?.state === 'on'
              || states['binary_sensor.south_wall_south_entrance_doorbell_person']?.state === 'on';
            const unlocked = states['lock.south_wall_home_connect_620_connected_smart_lock']?.state !== 'locked';
            if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'Check Now';
            if (doorbell || unlocked || entity.state === 'on') return 'Please Check the Building';
            return 'Everything Looks Good';
          ]]]
        label: >-
          [[[
            const doorbell = states['binary_sensor.south_wall_south_entrance_doorbell_visitor']?.state === 'on'
              || states['binary_sensor.south_wall_south_entrance_doorbell_person']?.state === 'on';
            const unlocked = states['lock.south_wall_home_connect_620_connected_smart_lock']?.state !== 'locked';
            const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
            const mode = states['input_select.bklf_building_mode']?.state || '';
            if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'Review cameras and security details.';
            if (doorbell) return 'Someone is at the door.';
            if (unlocked) return 'Front Entrance Unlocked';
            if (entity.state === 'on') return 'One or more reviewed areas need attention.';
            return 'All reviewed areas are secure and operating normally.';
          ]]]
        icon: >-
          [[[
            const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
            const mode = states['input_select.bklf_building_mode']?.state || '';
            if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'mdi:alert-octagon';
            if (entity.state === 'on') return 'mdi:shield-alert';
            return 'mdi:shield-check';
          ]]]
        show_label: true
        tap_action:
          action: navigate
          navigation_path: /bklf-main/security
        styles:
          card:
            - min-height: 176px
            - border-radius: 28px
            - padding: 24px
            - background: >-
                [[[
                  const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
                  const mode = states['input_select.bklf_building_mode']?.state || '';
                  if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'var(--wnyhs-emergency-background)';
                  return 'var(--ha-card-background)';
                ]]]
            - border: >-
                [[[
                  const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
                  const mode = states['input_select.bklf_building_mode']?.state || '';
                  if (motion && (mode === 'Closed' || mode === 'After Hours')) return '1px solid var(--wnyhs-emergency-border)';
                  return '1px solid var(--wnyhs-card-border)';
                ]]]
            - box-shadow: var(--ha-card-box-shadow)
          grid:
            - grid-template-areas: '"i" "n" "l"'
            - grid-template-columns: 1fr
            - grid-template-rows: min-content min-content min-content
          icon:
            - width: 54px
            - color: >-
                [[[
                  const motion = states['binary_sensor.bklf_interior_motion_active']?.state === 'on';
                  const mode = states['input_select.bklf_building_mode']?.state || '';
                  if (motion && (mode === 'Closed' || mode === 'After Hours')) return 'var(--wnyhs-emergency-border)';
                  if (entity.state === 'on') return 'var(--warning-color)';
                  return 'var(--wnyhs-lock-color)';
                ]]]
          name:
            - justify-self: start
            - font-size: 29px
            - font-weight: 800
            - color: var(--primary-text-color)
          label:
            - justify-self: start
            - font-size: 15px
            - color: var(--secondary-text-color)

      - type: vertical-stack
        title: Front Door
        cards:
          - type: picture-entity
            entity: camera.south_wall_south_entrance_doorbell_fluent
            camera_view: live
            show_name: false
            show_state: false
            aspect_ratio: 16x9
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border-radius: 24px;
                  overflow: hidden;
                  border: 1px solid var(--wnyhs-card-border);
                  background: var(--wnyhs-card-background);
                  box-shadow: var(--ha-card-box-shadow);
                }
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Talk
                icon: mdi:microphone
                tap_action:
                  action: more-info
                  entity: camera.south_wall_south_entrance_doorbell_fluent
                styles:
                  card:
                    - min-height: 64px
                    - border-radius: 18px
                    - background: var(--wnyhs-primary-button-background)
                    - color: var(--wnyhs-primary-button-text)
                  icon:
                    - color: var(--wnyhs-primary-button-text)
              - type: custom:button-card
                name: Unlock
                icon: mdi:lock-open-variant
                confirmation:
                  text: Unlock the front entry?
                tap_action:
                  action: call-service
                  service: lock.unlock
                  target:
                    entity_id: lock.south_wall_home_connect_620_connected_smart_lock
                styles:
                  card:
                    - min-height: 64px
                    - border-radius: 18px
                    - background: var(--wnyhs-emergency-background)
                    - border: 1px solid var(--wnyhs-unlock-color)
                  name:
                    - color: var(--wnyhs-emergency-text)
                    - font-weight: 800
                  icon:
                    - color: var(--wnyhs-unlock-color)
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Lock
                icon: mdi:lock
                tap_action:
                  action: call-service
                  service: lock.lock
                  target:
                    entity_id: lock.south_wall_home_connect_620_connected_smart_lock
                styles:
                  card:
                    - min-height: 58px
                    - border-radius: 18px
                    - background: var(--wnyhs-secondary-button-background)
                    - border: 1px solid var(--wnyhs-card-border)
                  icon:
                    - color: var(--wnyhs-lock-color)
              - type: custom:button-card
                name: View
                icon: mdi:fullscreen
                tap_action:
                  action: more-info
                  entity: camera.south_wall_south_entrance_doorbell_fluent
                styles:
                  card:
                    - min-height: 58px
                    - border-radius: 18px
                    - background: var(--wnyhs-secondary-button-background)
                    - border: 1px solid var(--wnyhs-card-border)
                  icon:
                    - color: var(--wnyhs-gold)
          - type: custom:mushroom-template-card
            primary: Door is closed and locked
            secondary: >-
              {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
                Door is open
              {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
                Lock needs review
              {% else %}
                Door is closed and locked
              {% endif %}
            icon: mdi:door-closed-lock
            icon_color: >-
              {% if is_state('binary_sensor.c01_south_entrance_door', 'on') %}
                amber
              {% elif not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
                red
              {% else %}
                green
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /bklf-main/doorbell

      - type: vertical-stack
        title: Cameras
        cards:
          - type: picture-entity
            entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
            name: Parking Lot
            camera_view: live
            show_state: false
            aspect_ratio: 16x9
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border-radius: 24px;
                  overflow: hidden;
                  border: 1px solid var(--wnyhs-card-border);
                  background: var(--wnyhs-card-background);
                  box-shadow: var(--ha-card-box-shadow);
                }
          - type: custom:button-card
            name: View Cameras
            icon: mdi:cctv
            tap_action:
              action: navigate
              navigation_path: /bklf-main/cameras
            styles:
              card:
                - min-height: 58px
                - border-radius: 18px
                - background: var(--wnyhs-secondary-button-background)
                - color: var(--wnyhs-secondary-button-text)
              icon:
                - color: var(--wnyhs-secondary-button-text)

      - type: custom:mushroom-template-card
        primary: Building Summary
        secondary: >-
          {% set exterior_attention = is_state('binary_sensor.bklf_exterior_secure', 'on') %}
          {% set motion_active = is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
          {% set lock_ready = is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
          {% if exterior_attention or motion_active or not lock_ready %}
            Please Check the Building
          {% else %}
            Doors All Closed - No Motion - All Locked - All Systems Normal
          {% endif %}
        icon: mdi:shield-check
        icon_color: >-
          {% if is_state('binary_sensor.bklf_building_secure', 'on') %}
            amber
          {% else %}
            green
          {% endif %}
        tap_action:
          action: navigate
          navigation_path: /bklf-main/security
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid var(--wnyhs-card-border);
              background: var(--wnyhs-card-background);
              min-height: 110px;
            }

      - type: logbook
        title: Recent Activity
        hours_to_show: 12
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - lock.south_wall_home_connect_620_connected_smart_lock
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_vehicle

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Home
            icon: mdi:home
            tap_action:
              action: navigate
              navigation_path: /bklf-main/home
            styles: &nav_button
              card:
                - min-height: 58px
                - border-radius: 18px
                - background: var(--wnyhs-card-background)
                - border: 1px solid var(--wnyhs-card-border)
              name:
                - font-size: 12px
                - color: var(--wnyhs-navigation-active)
              icon:
                - color: var(--wnyhs-navigation-active)
          - type: custom:button-card
            name: Doorbell
            icon: mdi:doorbell-video
            tap_action:
              action: navigate
              navigation_path: /bklf-main/doorbell
            styles: *nav_button
          - type: custom:button-card
            name: Cameras
            icon: mdi:cctv
            tap_action:
              action: navigate
              navigation_path: /bklf-main/cameras
            styles: *nav_button
          - type: custom:button-card
            name: Locks
            icon: mdi:lock
            tap_action:
              action: navigate
              navigation_path: /bklf-main/locks
            styles: *nav_button
          - type: custom:button-card
            name: More
            icon: mdi:dots-horizontal
            tap_action:
              action: navigate
              navigation_path: /bklf-main/more
            styles: *nav_button

