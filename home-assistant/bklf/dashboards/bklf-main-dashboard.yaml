                - border-radius: 999px
                - background: var(--wnyhs-camera-live-badge)
              icon:
                - color: var(--mdc-theme-on-primary)
          - type: custom:button-card
            name: Talk
            icon: mdi:microphone
            tap_action:
              action: more-info
              entity: camera.south_wall_south_entrance_doorbell_fluent
            styles:
              card:
                - min-height: 48px
                - border-radius: 999px
                - background: var(--wnyhs-primary-button-background)
                - color: var(--wnyhs-primary-button-text)
              icon:
                - color: var(--wnyhs-primary-button-text)

      - type: picture-entity
        entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
        name: Parking Lot
        camera_view: live
        show_state: false
        aspect_ratio: 16x9
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 24px;
              overflow: hidden;
              border: 1px solid var(--wnyhs-card-border);
              background: var(--wnyhs-card-background);
              box-shadow: var(--ha-card-box-shadow);
            }

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Live
            icon: mdi:record-circle
            tap_action:
              action: more-info
              entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
            styles:
              card:
                - min-height: 48px
                - border-radius: 999px
                - background: var(--wnyhs-camera-live-badge)
              icon:
                - color: var(--mdc-theme-on-primary)
          - type: custom:button-card
            name: View
            icon: mdi:fullscreen
            tap_action:
              action: more-info
              entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
            styles:
              card:
                - min-height: 48px
                - border-radius: 999px
                - background: var(--wnyhs-secondary-button-background)
                - color: var(--wnyhs-secondary-button-text)
              icon:
                - color: var(--wnyhs-secondary-button-text)

      - type: logbook
        title: Camera Activity
        hours_to_show: 12
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_vehicle
          - binary_sensor.bklf_cam01_person_active

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Home
            icon: mdi:home
            tap_action:
              action: navigate
              navigation_path: /bklf-main/home
