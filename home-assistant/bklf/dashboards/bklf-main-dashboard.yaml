              style: *status_card_style
          - type: custom:mushroom-template-card
            primary: Cameras
            secondary: Review front entrance and parking lot.
            icon: mdi:cctv
            icon_color: amber
            tap_action:
              action: navigate
              navigation_path: /bklf-main/cameras
            card_mod:
              style: *status_card_style
          - type: custom:mushroom-template-card
            primary: Locks
            secondary: Front entry lock status and actions.
            icon: mdi:lock
            icon_color: green
            tap_action:
              action: navigate
              navigation_path: /bklf-main/locks
            card_mod:
              style: *status_card_style
          - type: custom:mushroom-template-card
            primary: Security
            secondary: Doors, windows, motion, locks, and system status.
            icon: mdi:shield-check
            icon_color: green
            tap_action:
              action: navigate
              navigation_path: /bklf-main/security
            card_mod:
              style: *status_card_style
          - type: custom:mushroom-template-card
            primary: Activity
            secondary: Recent visitor, camera, lock, and door events.
            icon: mdi:history
            icon_color: amber
            tap_action:
              action: navigate
              navigation_path: /bklf-main/activity
            card_mod:
              style: *status_card_style

      - type: custom:mushroom-template-card
        primary: BK Lewis Funeral Home
        secondary: Front entry, cameras, locks, security, and activity.
        icon: mdi:map-marker-radius
        icon_color: amber
        card_mod:
          style: *status_card_style

      - type: custom:mushroom-template-card
        primary: Settings
        secondary: Customer preferences and display options.
        icon: mdi:cog
        icon_color: amber
        tap_action:
          action: navigate
          navigation_path: /profile
        card_mod:
          style: *status_card_style

      - type: vertical-stack
        title: System Status
        cards:
          - type: custom:mushroom-template-card
            primary: Building Status
            secondary: >-
              {% if is_state('binary_sensor.bklf_building_secure', 'on') %}
                Please Check the Building
              {% else %}
                Ready for normal use
              {% endif %}
            icon: mdi:shield-home
            icon_color: >-
              {% if is_state('binary_sensor.bklf_building_secure', 'on') %}
                amber
              {% else %}
                green
              {% endif %}
            card_mod:
              style: *status_card_style
          - type: custom:mushroom-template-card
            primary: Door And Window Summary
            secondary: >-
              {% if is_state('binary_sensor.bklf_exterior_secure', 'on') %}
                Please Check the Building
              {% else %}
                All reviewed openings secure
              {% endif %}
            icon: mdi:door-closed-lock
            icon_color: >-
              {% if is_state('binary_sensor.bklf_exterior_secure', 'on') %}
                amber
              {% else %}
                green
              {% endif %}
            card_mod:
              style: *status_card_style
          - type: custom:mushroom-template-card
            primary: Motion Summary
            secondary: >-
              {% if is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
                Attention
              {% else %}
                Clear
              {% endif %}
            icon: mdi:motion-sensor
            icon_color: >-
              {% if is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
                amber
              {% else %}
                green
              {% endif %}
            card_mod:
              style: *status_card_style

      - type: markdown
        title: Technician Mode
        content: >
          Technician Mode keeps setup and service details separate from the
          normal customer screens. Use this area only for owner-approved support
          review.
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              border: 1px solid var(--wnyhs-card-border);
              background: var(--wnyhs-card-background);
              box-shadow: var(--ha-card-box-shadow);
            }
