      - type: custom:button-card
        name: Cameras
        label: Doorbell first, parking lot second
        icon: mdi:cctv
        show_label: true
        styles:
          card:
            - min-height: 82px
            - border-radius: 22px
            - padding: 18px
            - background: var(--ha-card-background)
            - border: 1px solid var(--wnyhs-card-border)
          icon:
            - color: var(--wnyhs-gold)
          name:
            - font-size: 22px
            - font-weight: 800
          label:
