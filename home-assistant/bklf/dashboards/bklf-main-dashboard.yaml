            name: Doorbell
            icon: mdi:doorbell-video
            tap_action:
              action: navigate
              navigation_path: /bklf-main/doorbell
            styles: *nav_button
          - type: custom:button-card
            name: Cameras
            icon: mdi:cctv
            tap_action:
              action: navigate
              navigation_path: /bklf-main/cameras
            styles: *nav_button
          - type: custom:button-card
            name: Locks
            icon: mdi:lock
            tap_action:
              action: navigate
              navigation_path: /bklf-main/locks
            styles: *nav_button
          - type: custom:button-card
            name: More
            icon: mdi:dots-horizontal
            tap_action:
              action: navigate
              navigation_path: /bklf-main/more
            styles: *nav_button

  - title: Cameras
    path: cameras
    icon: mdi:cctv
