            styles: *nav_button
          - type: custom:button-card
            name: Locks
            icon: mdi:lock
            tap_action:
              action: navigate
              navigation_path: /bklf-main/locks
            styles: *nav_button
          - type: custom:button-card
            name: More
            icon: mdi:dots-horizontal
            tap_action:
