        tap_action:
          action: navigate
          navigation_path: /bklf-main/home
        styles:
          card:
            - min-height: 132px
            - border-radius: 30px
            - padding: 24px
            - background: linear-gradient(135deg, var(--wnyhs-card-background), var(--wnyhs-secondary-button-background))
            - border: 1px solid var(--wnyhs-gold)
            - border-left: 5px solid var(--wnyhs-gold)
            - box-shadow: var(--ha-card-box-shadow)
          icon:
            - width: 58px
            - color: var(--wnyhs-gold)
          name:
            - justify-self: start
            - font-size: 27px
            - font-weight: 800
          label:
            - justify-self: start
            - color: var(--secondary-text-color)

      - type: vertical-stack
        title: App Menu
        cards:
          - type: custom:mushroom-template-card
            primary: Front Door
            secondary: Talk, view, lock, and unlock.
            icon: mdi:doorbell-video
            icon_color: amber
            tap_action:
              action: navigate
              navigation_path: /bklf-main/doorbell
