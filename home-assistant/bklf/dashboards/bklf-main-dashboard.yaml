title: WNYHS Customer Control Center
views:
  - title: Home
    path: home
    icon: mdi:home-shield
    cards:
      - type: markdown
        title: WNY Home Security
        content: >
          {% set doorbell_active =
            is_state('binary_sensor.south_wall_south_entrance_doorbell_visitor', 'on')
            or is_state('binary_sensor.south_wall_south_entrance_doorbell_person', 'on') %}
          {% set lock_unlocked =
            not is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
          {% set building_attention =
            is_state('binary_sensor.bklf_building_secure', 'on') %}
          ## {% if building_attention or doorbell_active or lock_unlocked %}Please Check the Building{% else %}Everything Looks Good{% endif %}

          {% if doorbell_active %}
          Someone is at the door.
          {% elif lock_unlocked %}
          Front Entrance Unlocked
          {% elif building_attention %}
          One or more areas need review.
          {% else %}
          Nothing requires your attention.
          {% endif %}

          **BK Lewis Funeral Home**

      - type: vertical-stack
        title: Front Entry
        cards:
          - type: picture-entity
            title: Doorbell
            entity: camera.south_wall_south_entrance_doorbell_fluent
            camera_view: live
            show_state: false
            show_name: false
          - type: markdown
            title: Talk to Visitor
            content: >
              Use the doorbell microphone control in the Reolink app when
              two-way audio is needed.
          - type: entities
            title: Lock / Unlock
            show_header_toggle: false
            entities:
              - entity: lock.south_wall_home_connect_620_connected_smart_lock
                name: South Entrance Lock

      - type: entities
        title: Primary Lock
        show_header_toggle: false
        entities:
          - entity: lock.south_wall_home_connect_620_connected_smart_lock
            name: South Entrance / Front Entry
          - entity: binary_sensor.c01_south_entrance_door
            name: South Entrance Door

      - type: picture-entity
        title: Doorbell Camera
        entity: camera.south_wall_south_entrance_doorbell_fluent
        camera_view: live
        show_state: false
        show_name: false

      - type: picture-entity
        title: Parking Lot Camera
        entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
        camera_view: live
        show_state: false
        show_name: false

      - type: markdown
        title: Building Summary
        content: >
          {% set exterior_attention =
            is_state('binary_sensor.bklf_exterior_secure', 'on') %}
          {% set motion_active =
            is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
          {% set lock_ready =
            is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
          **{% if exterior_attention or motion_active or not lock_ready %}Please Check the Building{% else %}Building Secure{% endif %}**

          - {% if exterior_attention %}Doors need review{% else %}Doors Secure{% endif %}
          - {% if lock_ready %}Lock Ready{% else %}Front Entrance Unlocked{% endif %}
          - {% if motion_active %}Motion Detected{% else %}No Motion{% endif %}

      - type: logbook
        title: Recent Activity
        hours_to_show: 12
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - lock.south_wall_home_connect_620_connected_smart_lock
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.c09_west_service_door
          - binary_sensor.c10_south_wall_window_1
          - binary_sensor.c11_south_wall_window_2
          - binary_sensor.c12_upstairs_back_porch_door
          - binary_sensor.m01_main_hallway_motion
          - binary_sensor.m02_viewing_room_motion

  - title: Doorbell
    path: doorbell
    icon: mdi:doorbell-video
    cards:
      - type: picture-entity
        title: Doorbell
        entity: camera.south_wall_south_entrance_doorbell_fluent
        camera_view: live
        show_state: false
        show_name: false

      - type: markdown
        title: Talk to Visitor
        content: >
          Use the doorbell microphone control in the Reolink app when two-way
          audio is needed. This dashboard does not add a separate talk control.

      - type: entities
        title: Lock / Unlock
        show_header_toggle: false
        entities:
          - entity: lock.south_wall_home_connect_620_connected_smart_lock
            name: South Entrance Lock
          - entity: binary_sensor.c01_south_entrance_door
            name: South Entrance Door

      - type: entities
        title: Visitor Status
        show_header_toggle: false
        entities:
          - entity: binary_sensor.south_wall_south_entrance_doorbell_visitor
            name: Someone is at the door
          - entity: binary_sensor.south_wall_south_entrance_doorbell_person
            name: Person at Front Entry
          - entity: binary_sensor.south_wall_south_entrance_doorbell_motion
            name: Doorbell Motion

      - type: logbook
        title: Recent Visitor Activity
        hours_to_show: 12
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - binary_sensor.south_wall_south_entrance_doorbell_motion
          - lock.south_wall_home_connect_620_connected_smart_lock

  - title: Cameras
    path: cameras
    icon: mdi:cctv
    cards:
      - type: picture-entity
        title: Doorbell
        entity: camera.south_wall_south_entrance_doorbell_fluent
        camera_view: live
        show_state: false
        show_name: false

      - type: picture-entity
        title: Parking Lot
        entity: camera.south_wall_cam01_southwest_corner_parking_lot_fluent
        camera_view: live
        show_state: false
        show_name: false

      - type: entities
        title: Camera Activity
        show_header_toggle: false
        entities:
          - entity: binary_sensor.south_wall_south_entrance_doorbell_visitor
            name: Doorbell
          - entity: binary_sensor.south_wall_south_entrance_doorbell_person
            name: Person at Front Entry
          - entity: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
            name: Parking Lot Person
          - entity: binary_sensor.south_wall_cam01_southwest_corner_parking_lot_vehicle
            name: Parking Lot Vehicle
          - entity: binary_sensor.bklf_cam01_person_active
            name: Parking Lot Activity

  - title: Locks
    path: locks
    icon: mdi:lock-smart
    cards:
      - type: markdown
        title: Front Entry
        content: >
          {% if is_state('lock.south_wall_home_connect_620_connected_smart_lock', 'locked') %}
          **Lock Ready**

          South Entrance / Front Entry is locked.
          {% else %}
          **Front Entrance Unlocked**

          Review the South Entrance / Front Entry.
          {% endif %}

      - type: entities
        title: Lock / Unlock
        show_header_toggle: false
        entities:
          - entity: lock.south_wall_home_connect_620_connected_smart_lock
            name: South Entrance / Front Entry
          - entity: binary_sensor.c01_south_entrance_door
            name: South Entrance Door
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_lock_jammed
            name: Lock Needs Review
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_replace_battery_now
            name: Battery Review Now

      - type: logbook
        title: Recent Access Activity
        hours_to_show: 12
        entities:
          - lock.south_wall_home_connect_620_connected_smart_lock
          - binary_sensor.c01_south_entrance_door

  - title: Security
    path: security
    icon: mdi:shield-check
    cards:
      - type: markdown
        title: Building Secure
        content: >
          {% set exterior_attention =
            is_state('binary_sensor.bklf_exterior_secure', 'on') %}
          {% set motion_active =
            is_state('binary_sensor.bklf_interior_motion_active', 'on') %}
          **{% if exterior_attention or motion_active %}Please Check the Building{% else %}Building Secure{% endif %}**

          {% if exterior_attention %}
          One or more doors or windows need review.
          {% else %}
          Doors Secure
          {% endif %}

          {% if motion_active %}
          Motion Detected
          {% else %}
          No Motion
          {% endif %}

      - type: entities
        title: Doors and Windows
        show_header_toggle: false
        entities:
          - entity: binary_sensor.c01_south_entrance_door
            name: South Entrance Door
          - entity: binary_sensor.c09_west_service_door
            name: West Service Door
          - entity: binary_sensor.c10_south_wall_window_1
            name: Front Double Door - Left
          - entity: binary_sensor.c11_south_wall_window_2
            name: Front Double Door - Right
          - entity: binary_sensor.c12_upstairs_back_porch_door
            name: Upstairs Back Porch Door
          - entity: binary_sensor.c05_north_wall_window_1
            name: North Window 1
          - entity: binary_sensor.c06_north_wall_window_2
            name: North Window 2
          - entity: binary_sensor.c07_north_wall_window_3
            name: North Window 3
          - entity: binary_sensor.c08_north_wall_window_4
            name: North Window 4

      - type: entities
        title: Motion
        show_header_toggle: false
        entities:
          - entity: binary_sensor.bklf_interior_motion_active
            name: Motion Summary
          - entity: binary_sensor.m01_main_hallway_motion
            name: Main Hallway
          - entity: binary_sensor.m02_viewing_room_motion
            name: Viewing Room

  - title: Activity
    path: activity
    icon: mdi:history
    cards:
      - type: logbook
        title: Today
        hours_to_show: 24
        entities:
          - binary_sensor.south_wall_south_entrance_doorbell_visitor
          - binary_sensor.south_wall_south_entrance_doorbell_person
          - lock.south_wall_home_connect_620_connected_smart_lock
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.c09_west_service_door
          - binary_sensor.c10_south_wall_window_1
          - binary_sensor.c11_south_wall_window_2
          - binary_sensor.c12_upstairs_back_porch_door
          - binary_sensor.m01_main_hallway_motion
          - binary_sensor.m02_viewing_room_motion
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_person
          - binary_sensor.south_wall_cam01_southwest_corner_parking_lot_vehicle

  - title: More
    path: more
    icon: mdi:dots-horizontal-circle
    cards:
      - type: markdown
        title: WNY Home Security
        content: >
          **WNYHS Customer Control Center**

          BK Lewis Funeral Home

          Customer-safe dashboard for front entry, cameras, locks, security,
          activity, and secondary system review.

      - type: entities
        title: System Health
        show_header_toggle: false
        entities:
          - entity: binary_sensor.bklf_building_secure
            name: Building Status
          - entity: binary_sensor.bklf_exterior_secure
            name: Door and Window Summary
          - entity: binary_sensor.bklf_interior_motion_active
            name: Motion Summary
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_lock_jammed
            name: Lock Needs Review
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_replace_battery_soon
            name: Battery Review Soon
          - entity: binary_sensor.south_wall_home_connect_620_connected_smart_lock_replace_battery_now
            name: Battery Review Now

      - type: markdown
        title: Technician Mode
        content: >
          Technician review stays separate from the normal customer screens.
          Use this area only for owner-approved support review.
