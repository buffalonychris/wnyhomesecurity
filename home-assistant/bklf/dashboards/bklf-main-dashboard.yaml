title: BKLF First Floor
views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    cards:
      - type: entities
        title: Building Status
        entities:
          - entity: binary_sensor.bklf_building_secure
            name: Building Secure
          - entity: input_select.bklf_building_mode
            name: Building Mode
          - entity: input_boolean.bklf_building_armed
            name: Building Armed
          - entity: binary_sensor.bklf_south_entrance_active
            name: South Entrance
      - type: glance
        title: Door and Window Summary
        entities:
          - binary_sensor.bklf_exterior_secure
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.c02_east_door_left
          - binary_sensor.c03_east_door_right
          - binary_sensor.c04_west_door
      - type: glance
        title: Motion Summary
        entities:
          - binary_sensor.bklf_interior_motion_active
          - binary_sensor.m01_main_hallway_motion
          - binary_sensor.m02_viewing_room_motion
      - type: markdown
        title: Recent Activity
        content: >
          Recent activity placeholder. Add final logbook/history cards after live
          entity IDs are verified.
      - type: markdown
        title: System Health
        content: >
          System health placeholder for Home Assistant Green, radios, backups,
          network, and UPS status.

  - title: Exterior
    path: exterior
    icon: mdi:home-group
    cards:
      - type: entities
        title: North Wall Windows
        entities:
          - binary_sensor.c05_north_wall_window_1
          - binary_sensor.c06_north_wall_window_2
          - binary_sensor.c07_north_wall_window_3
          - binary_sensor.c08_north_wall_window_4
          - binary_sensor.c09_north_wall_window_5
      - type: entities
        title: South Wall Door and Windows
        entities:
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.c10_south_wall_window_1
          - binary_sensor.c11_south_wall_window_2
          - binary_sensor.c12_south_wall_window_3
          - binary_sensor.c13_south_wall_window_4
          - binary_sensor.c14_south_wall_window_5
      - type: entities
        title: East Wall Double Door
        entities:
          - binary_sensor.c02_east_door_left
          - binary_sensor.c03_east_door_right
      - type: entities
        title: West Wall Door
        entities:
          - binary_sensor.c04_west_door
      - type: markdown
        title: Deferred and Future Sensors
        content: >
          East Wall Window 01 and West Wall Window 01 are deferred operable-window
          contact placeholders. Two East Wall fixed picture windows are future
          impact/shock sensor placeholders. Verify entity IDs before final use.

  - title: Entrances
    path: entrances
    icon: mdi:door
    cards:
      - type: entities
        title: South Entrance
        entities:
          - binary_sensor.c01_south_entrance_door
          - lock.south_wall_lock
          - camera.south_wall_doorbell
      - type: entities
        title: East and West Entrances
        entities:
          - binary_sensor.c02_east_door_left
          - binary_sensor.c03_east_door_right
          - binary_sensor.c04_west_door
      - type: markdown
        title: Remote Entry Notes
        content: >
          Remote-entry cards are placeholders until the South Wall lock,
          doorbell, and final mobile app workflow are verified in live Home Assistant.

  - title: Cameras
    path: cameras
    icon: mdi:cctv
    cards:
      - type: tile
        entity: camera.south_wall_doorbell
        name: South Wall Doorbell
      - type: tile
        entity: camera.south_wall_corner_camera
        name: South Wall Corner Camera
      - type: markdown
        title: Existing Camera Systems
        content: >
          Existing camera systems are excluded unless separately approved. This
          dashboard scaffold uses only the planned South Wall camera placeholders.

  - title: Security
    path: security
    icon: mdi:shield-home
    cards:
      - type: entities
        title: Door Contacts
        entities:
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.c02_east_door_left
          - binary_sensor.c03_east_door_right
          - binary_sensor.c04_west_door
      - type: entities
        title: Active Window Contacts
        entities:
          - binary_sensor.c05_north_wall_window_1
          - binary_sensor.c06_north_wall_window_2
          - binary_sensor.c07_north_wall_window_3
          - binary_sensor.c08_north_wall_window_4
          - binary_sensor.c09_north_wall_window_5
          - binary_sensor.c10_south_wall_window_1
          - binary_sensor.c11_south_wall_window_2
          - binary_sensor.c12_south_wall_window_3
          - binary_sensor.c13_south_wall_window_4
          - binary_sensor.c14_south_wall_window_5
      - type: entities
        title: Motion Sensors
        entities:
          - binary_sensor.m01_main_hallway_motion
          - binary_sensor.m02_viewing_room_motion
      - type: glance
        title: Summary Sensors
        entities:
          - binary_sensor.bklf_building_secure
          - binary_sensor.bklf_exterior_secure
          - binary_sensor.bklf_interior_motion_active

  - title: Activity
    path: activity
    icon: mdi:history
    cards:
      - type: history-graph
        title: Door and Window History
        hours_to_show: 24
        entities:
          - binary_sensor.c01_south_entrance_door
          - binary_sensor.c02_east_door_left
          - binary_sensor.c03_east_door_right
          - binary_sensor.c04_west_door
          - binary_sensor.c05_north_wall_window_1
          - binary_sensor.c10_south_wall_window_1
      - type: history-graph
        title: Motion History
        hours_to_show: 24
        entities:
          - binary_sensor.m01_main_hallway_motion
          - binary_sensor.m02_viewing_room_motion
      - type: logbook
        title: Lock and Doorbell Activity
        entities:
          - lock.south_wall_lock
          - camera.south_wall_doorbell
      - type: markdown
        title: Activity Notes
        content: >
          Add final lock, doorbell, and camera event entities after live entity
          verification.

  - title: Infrastructure
    path: infrastructure
    icon: mdi:server-network
    cards:
      - type: markdown
        title: Home Assistant Green
        content: >
          Home Assistant Green status placeholder. Record backup checkpoints and
          update status during bench validation.
      - type: markdown
        title: Zigbee Coordinator
        content: >
          Sonoff Zigbee 3.0 USB Dongle Plus-E / ZBDongle-E status placeholder.
      - type: markdown
        title: Z-Wave Controller
        content: >
          Zooz ZST39 800LR controller status placeholder.
      - type: markdown
        title: Network and UPS
        content: >
          Network, PoE switch, local access, and UPS placeholders. Do not store
          secrets, passwords, private URLs, or credential values in dashboard notes.
