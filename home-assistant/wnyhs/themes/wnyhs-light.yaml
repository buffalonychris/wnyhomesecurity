WNYHS Light:
  # WNYHS core palette and semantic tokens.
  # Gold: antique identity/accent used in the approved mockups.
  wnyhs-gold: "#c58b12"
  wnyhs-gold-soft: "#f0c85b"
  wnyhs-gold-muted: "#8b6514"
  # Burgundy: primary action and selected card surfaces.
  wnyhs-burgundy: "#7b0714"
  wnyhs-burgundy-deep: "#4b060d"
  wnyhs-burgundy-soft: "#b72a32"
  # Base surfaces: warm ivory, charcoal, readable text.
  wnyhs-near-black: "#090909"
  wnyhs-charcoal: "#232426"
  wnyhs-charcoal-raised: "#34302b"
  wnyhs-ivory: "#fbf4df"
  wnyhs-muted-text: "#6d6254"
  # Status colors: success, warning, critical.
  wnyhs-success-green: "#1f9d45"
  wnyhs-warning-amber: "#c78200"
  wnyhs-critical-red: "#c7262e"

  # Home Assistant base colors.
  primary-color: "#7b0714"
  accent-color: "#c58b12"
  dark-primary-color: "#4b060d"
  light-primary-color: "#f0c85b"
  primary-background-color: "#fbf4df"
  secondary-background-color: "#f3ead5"
  lovelace-background: "#fbf4df"
  markdown-code-background-color: "#efe2c6"

  # Text.
  primary-text-color: "#232426"
  secondary-text-color: "#4d453b"
  text-primary-color: "#fbf4df"
  disabled-text-color: "#9a907f"
  divider-color: "rgba(123, 7, 20, 0.18)"
  error-color: "#c7262e"
  warning-color: "#c78200"
  success-color: "#1f9d45"
  info-color: "#1f6fb8"

  # Cards and rounded customer-control-center surfaces.
  card-background-color: "#fffaf0"
  ha-card-background: "linear-gradient(180deg, rgba(255, 250, 240, 0.98), rgba(245, 237, 218, 0.98))"
  ha-card-border-radius: "18px"
  ha-card-border-width: "1px"
  ha-card-border-color: "rgba(197, 139, 18, 0.42)"
  ha-card-box-shadow: "0 14px 32px rgba(72, 54, 22, 0.16), 0 0 18px rgba(197, 139, 18, 0.12)"
  border-radius: "18px"
  mdc-shape-medium: "18px"
  mdc-shape-small: "14px"

  # Header, sidebar, and navigation shell.
  app-header-background-color: "#7b0714"
  app-header-text-color: "#fbf4df"
  app-header-selection-bar-color: "#f0c85b"
  sidebar-background-color: "#fffaf0"
  sidebar-text-color: "#4d453b"
  sidebar-icon-color: "#7a7164"
  sidebar-selected-background-color: "rgba(123, 7, 20, 0.10)"
  sidebar-selected-text-color: "#7b0714"
  sidebar-selected-icon-color: "#c58b12"

  # Icons and state colors.
  paper-item-icon-color: "#c58b12"
  paper-item-icon-active-color: "#1f9d45"
  state-icon-color: "#c58b12"
  state-icon-active-color: "#1f9d45"
  state-icon-unavailable-color: "#9a907f"
  state-lock-locked-color: "#1f9d45"
  state-lock-unlocked-color: "#c7262e"
  state-binary-sensor-on-color: "#c78200"
  state-binary-sensor-off-color: "#1f9d45"
  state-cover-open-color: "#c78200"
  state-cover-closed-color: "#1f9d45"
  state-person-home-color: "#1f9d45"
  state-person-not-home-color: "#7a7164"

  # Form controls and material components.
  mdc-theme-primary: "#7b0714"
  mdc-theme-secondary: "#c58b12"
  mdc-theme-background: "#fbf4df"
  mdc-theme-surface: "#fffaf0"
  mdc-theme-on-primary: "#fbf4df"
  mdc-theme-on-secondary: "#232426"
  mdc-theme-on-surface: "#232426"
  input-fill-color: "#fffaf0"
  input-ink-color: "#232426"
  input-label-ink-color: "#6d6254"
  input-idle-line-color: "rgba(123, 7, 20, 0.20)"
  input-hover-line-color: "#7b0714"

  # Semantic button and dashboard role variables for custom cards.
  wnyhs-card-background: "#fffaf0"
  wnyhs-card-border: "rgba(197, 139, 18, 0.42)"
  wnyhs-primary-button-background: "#7b0714"
  wnyhs-primary-button-text: "#fbf4df"
  wnyhs-secondary-button-background: "#efe2c6"
  wnyhs-secondary-button-text: "#7b0714"
  wnyhs-navigation-active: "#c58b12"
  wnyhs-navigation-inactive: "#7a7164"
  wnyhs-camera-live-badge: "#1f9d45"
  wnyhs-lock-color: "#1f9d45"
  wnyhs-unlock-color: "#c7262e"
  wnyhs-emergency-background: "#fff1ed"
  wnyhs-emergency-border: "#c7262e"
  wnyhs-emergency-text: "#7b0714"

  # HACS/custom card readiness: Mushroom, Button Card, Bubble Card,
  # Card Mod, Layout Card, Swipe Card, Browser Mod, and Auto-Entities.
  mushroom-card-primary-color: "#232426"
  mushroom-card-secondary-color: "#6d6254"
  mushroom-shape-color: "rgba(197, 139, 18, 0.14)"
  mushroom-shape-icon-color: "#c58b12"
  mushroom-state-info-color: "#1f6fb8"
  mushroom-state-success-color: "#1f9d45"
  mushroom-state-warning-color: "#c78200"
  mushroom-state-danger-color: "#c7262e"
  button-card-border-radius: "18px"
  button-card-background-color: "#fffaf0"
  button-card-primary-action-background: "#7b0714"
  bubble-main-background-color: "#fffaf0"
  bubble-accent-color: "#c58b12"
  card-mod-theme: "WNYHS Light"
  layout-card-margin: "10px"
  swipe-card-bullet-active-color: "#c58b12"
  browser-mod-popup-border-radius: "18px"
  auto-entities-card-background: "#fffaf0"
